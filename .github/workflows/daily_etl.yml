name: Daily Crypto ETL Pipeline

on:
  schedule:
    # Runs everyday at midnight UTC (5:30 AM IST)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to manually trigger the pipeline from GitHub anytime

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Project Dependencies
      run: |
        pip install --upgrade pip
        if [ -f 02-descriptive_analytics/crypto_tracking_pipeline/requirements.txt ]; then
          pip install -r 02-descriptive_analytics/crypto_tracking_pipeline/requirements.txt
        else
          pip install pandas requests
        fi

    - name: Execute ETL Script
      run: |
        python 02-descriptive_analytics/crypto_tracking_pipeline/src/pipeline.py

    - name: Commit and Push Updated Data Warehouse
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git add 02-descriptive_analytics/crypto_tracking_pipeline/data/crypto_warehouse.db
        
        # Only commit if the database actually changed to avoid empty commit errors
        git diff --quiet && git diff --staged --quiet || (git commit -m "chrono: automated daily warehouse update [skip ci]" && git push)